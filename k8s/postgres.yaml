apiVersion: v1
kind: Secret
metadata:
  name: music-db-secret
type: Opaque
stringData:
  POSTGRES_USER: music
  POSTGRES_PASSWORD: music
  POSTGRES_DB: music
  DATABASE_URL: postgres://music:music@music-postgres:5432/music
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: music-postgres
  template:
    metadata:
      labels:
        app: music-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: music-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: music-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: music-db-secret
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pgdata
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: music-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: music-postgres
spec:
  selector:
    app: music-postgres
  ports:
    - port: 5432
      targetPort: 5432
