apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: music-backend
  template:
    metadata:
      labels:
        app: music-backend
    spec:
      containers:
        - name: backend
          image: neferkey/music-backend:latest
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: music-db-secret
                  key: DATABASE_URL
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: music-backend
spec:
  selector:
    app: music-backend
  ports:
    - port: 3000
      targetPort: 3000
