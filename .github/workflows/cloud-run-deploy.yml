name: CI + Docker Hub + Cloud Run

on:
  push:
    branches: [main, copilot/enhance-frontend-for-music-player]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  BACKEND_IMAGE_NAME: music-backend
  FRONTEND_IMAGE_NAME: music-frontend
  GCP_REGION: europe-west1
  BACKEND_SERVICE_NAME: neferkey-music-backend
  FRONTEND_SERVICE_NAME: neferkey-music-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend tests
        run: |
          cd backend
          npm ci
          npm test

      - name: Frontend tests + build
        run: |
          cd frontend
          npm ci
          npm test
          npm run build

  build-backend:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      backend_image_sha: ${{ steps.meta.outputs.backend_image_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "backend_image_sha=docker.io/${DOCKERHUB_USERNAME}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_image_latest=docker.io/${DOCKERHUB_USERNAME}/${BACKEND_IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.deploy.outputs.backend_url }}
    steps:
      - name: Check deploy secret availability
        id: check
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATABASE_URL_SECRET_NAME: ${{ secrets.GCP_DATABASE_URL_SECRET_NAME }}
          GCP_JWT_SECRET_NAME: ${{ secrets.GCP_JWT_SECRET_NAME }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ] || [ -z "${GCP_DATABASE_URL_SECRET_NAME}" ] || [ -z "${GCP_JWT_SECRET_NAME}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Missing required GCP deploy secrets. Skipping Cloud Run deployment."
          elif [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] && [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=workload_identity" >> "$GITHUB_OUTPUT"
          elif [ -n "${GCP_SA_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=service_account_key" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Missing GCP auth secrets. Provide either GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT, or GCP_SA_KEY."
          fi

      - name: Authenticate to Google Cloud (Workload Identity)
        if: steps.check.outputs.enabled == 'true' && steps.check.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: steps.check.outputs.enabled == 'true' && steps.check.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        if: steps.check.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend Cloud Run service
        id: deploy
        if: steps.check.outputs.enabled == 'true'
        env:
          BACKEND_IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          DATABASE_URL_SECRET: ${{ secrets.GCP_DATABASE_URL_SECRET_NAME }}
          JWT_SECRET_SECRET: ${{ secrets.GCP_JWT_SECRET_NAME }}
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.GCP_CLOUD_SQL_CONNECTION_NAME }}
          GCS_UPLOAD_BUCKET: ${{ secrets.GCP_GCS_UPLOAD_BUCKET }}
        run: |
          set -euo pipefail
          ENV_VARS="NODE_ENV=production,GCS_UPLOAD_PREFIX=uploads"
          if [ -n "${GCS_UPLOAD_BUCKET}" ]; then
            ENV_VARS="${ENV_VARS},GCS_UPLOAD_BUCKET=${GCS_UPLOAD_BUCKET}"
          fi
          ARGS=(
            "--image=${BACKEND_IMAGE}"
            "--region=${GCP_REGION}"
            "--platform=managed"
            "--allow-unauthenticated"
            "--port=3000"
            "--set-env-vars=${ENV_VARS}"
            "--set-secrets=DATABASE_URL=${DATABASE_URL_SECRET}:latest,JWT_SECRET=${JWT_SECRET_SECRET}:latest"
          )
          if [ -n "${CLOUD_SQL_CONNECTION_NAME}" ]; then
            ARGS+=("--add-cloudsql-instances=${CLOUD_SQL_CONNECTION_NAME}")
          fi
          gcloud run deploy "${BACKEND_SERVICE_NAME}" "${ARGS[@]}"
          BACKEND_URL="$(gcloud run services describe "${BACKEND_SERVICE_NAME}" --region "${GCP_REGION}" --format='value(status.url)')"
          echo "backend_url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

  build-and-deploy-frontend:
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    if: ${{ needs.deploy-backend.outputs.backend_url != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ needs.deploy-backend.outputs.backend_url }}/api
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Check frontend deploy auth availability
        id: check-frontend-auth
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Missing GCP_PROJECT_ID. Skipping frontend Cloud Run deployment."
          elif [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] && [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=workload_identity" >> "$GITHUB_OUTPUT"
          elif [ -n "${GCP_SA_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "auth_mode=service_account_key" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Missing GCP auth secrets. Provide either GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT, or GCP_SA_KEY."
          fi

      - name: Authenticate to Google Cloud (Workload Identity)
        if: steps.check-frontend-auth.outputs.enabled == 'true' && steps.check-frontend-auth.outputs.auth_mode == 'workload_identity'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: steps.check-frontend-auth.outputs.enabled == 'true' && steps.check-frontend-auth.outputs.auth_mode == 'service_account_key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        if: steps.check-frontend-auth.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy frontend Cloud Run service
        if: steps.check-frontend-auth.outputs.enabled == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          gcloud run deploy "${FRONTEND_SERVICE_NAME}" \
            --image "docker.io/${DOCKERHUB_USERNAME}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080