services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
      POSTGRES_DB: music
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music -d music"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://music:music@db:5432/music
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
